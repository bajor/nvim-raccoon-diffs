name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Neovim ${{ matrix.neovim }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: [v0.10.4, v0.12.4]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          version: ${{ matrix.neovim }}
          neovim: true

      - name: Install Lua and Luacheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.4 lua-check

      - name: Test, lint, and verify host compatibility
        run: make test
